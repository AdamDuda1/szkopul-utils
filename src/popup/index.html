<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Szkopuł Utils (Popup)</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="bootstrap5min.css">
    <link rel="stylesheet" href="bootstrap3min.css">
    <script type="module" src="./panel.js"></script>
</head>
<body>
    <div id="home">
        <h2>Szkopuł Utils</h2>

        <button class="btn btn-primary" id="btn-virtual">
            KONKURS WIRTUALNY
            <img src="../icons/ic-arrow-right.svg" alt="">
        </button>

        <button class="btn btn-primary" id="btn-showTODO">
            ZADANIA DO ZROBIENIA
            <img src="../icons/ic-arrow-right.svg" alt="">
        </button>

        <button class="btn btn-primary" id="btn-options">
            OPCJE
            <img src="../icons/ic-arrow-right.svg" alt="">
        </button>

        <div class="form-check form-switch" style="margin-top: 10px;">
            <input class="form-check-input" type="checkbox" id="flexSwitchCheckDefault">
            <label class="form-check-label" for="flexSwitchCheckDefault">
                Ukrywaj wyniki
            </label>
        </div>
    </div>

    <div id="todo" style="display: none;">
        <div>
            <button class="btn btn-default">
                <img src="../icons/ic-arrow-right.svg" alt="" class="back-btn">
            </button>
            <h3>Zadania do zrobienia</h3>
        </div>

        <br>

        <button type="button" class="btn btn-info">Otwórz pełną listę</button>
    </div>

    <div id="options" style="display: none;">
        <div>
            <button class="btn btn-default" id="btn-backHome-options">
                <img src="../icons/ic-arrow-right.svg" alt="" class="back-btn">
            </button>
            <h3>Opcje</h3>
        </div>

        <br>

        <button type="button" class="btn btn-info">Otwórz pełną listę</button>
    </div>
</body>
</html>
